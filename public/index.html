<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🎲 Buddy Roller</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #0d1117;
      color: #c9d1d9;
      font-family: 'Courier New', Courier, monospace;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 2.5rem 1rem 4rem;
    }
    h1 { font-size: 1.8rem; letter-spacing: 0.12em; margin-bottom: 0.4rem; }
    .subtitle { color: #6e7681; font-size: 0.85rem; margin-bottom: 2rem; }
    .controls {
      display: flex;
      gap: 0.5rem;
      margin-bottom: 2rem;
      flex-wrap: wrap;
      justify-content: center;
    }
    input[type="text"] {
      background: #161b22;
      border: 1px solid #30363d;
      color: #c9d1d9;
      padding: 0.5rem 1rem;
      font-family: inherit;
      font-size: 0.9rem;
      border-radius: 6px;
      width: 280px;
      outline: none;
      transition: border-color 0.2s;
    }
    input[type="text"]:focus { border-color: #58a6ff; }
    button {
      background: #21262d;
      border: 1px solid #30363d;
      color: #c9d1d9;
      padding: 0.5rem 1.4rem;
      font-family: inherit;
      font-size: 0.9rem;
      border-radius: 6px;
      cursor: pointer;
      transition: background 0.2s, border-color 0.2s;
    }
    button:hover:not(:disabled) { background: #30363d; border-color: #6e7681; }
    button:disabled { opacity: 0.5; cursor: default; }
    .card {
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 10px;
      padding: 1.5rem 1.8rem;
      max-width: 460px;
      width: 100%;
    }
    .rarity-badge {
      display: inline-block;
      font-size: 0.7rem;
      font-weight: bold;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      padding: 0.15em 0.6em;
      border-radius: 4px;
      margin-bottom: 0.6rem;
    }
    .rarity-common    { background: #3d3d3d; color: #9e9e9e; }
    .rarity-uncommon  { background: #1a3a1f; color: #56d364; }
    .rarity-rare      { background: #0d2a4d; color: #58a6ff; }
    .rarity-epic      { background: #2e1a47; color: #bc8cff; }
    .rarity-legendary { background: #3d2a00; color: #e3b341; }
    .shiny-badge {
      display: inline-block;
      margin-left: 0.5rem;
      font-size: 0.7rem;
      letter-spacing: 0.1em;
      color: #e3b341;
    }
    .species-row {
      display: flex;
      align-items: baseline;
      gap: 0.5rem;
      margin-bottom: 0.25rem;
    }
    .species-name { font-size: 1.2rem; font-weight: bold; }
    .species-cn { color: #6e7681; font-size: 0.9rem; }
    .meta { color: #6e7681; font-size: 0.8rem; margin-bottom: 1rem; }
    .sprite-wrap {
      background: #0d1117;
      border: 1px solid #21262d;
      border-radius: 6px;
      padding: 0.75rem 1.2rem;
      margin-bottom: 1.25rem;
      display: inline-block;
      min-width: 160px;
    }
    pre.sprite {
      font-size: 0.88rem;
      line-height: 1.45;
      white-space: pre;
    }
    .divider { border: none; border-top: 1px solid #21262d; margin: 1rem 0; }
    .stats-title {
      font-size: 0.72rem;
      color: #6e7681;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      margin-bottom: 0.8rem;
    }
    .stat-row {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      margin-bottom: 0.45rem;
      font-size: 0.82rem;
    }
    .stat-name { width: 110px; flex-shrink: 0; color: #8b949e; }
    .stat-bar-bg {
      flex: 1;
      background: #0d1117;
      border-radius: 3px;
      height: 7px;
      overflow: hidden;
    }
    .stat-bar-fill { height: 100%; border-radius: 3px; transition: width 0.5s ease; }
    .stat-value { width: 28px; text-align: right; flex-shrink: 0; }
    .seed-display {
      margin-top: 1rem;
      color: #3d444d;
      font-size: 0.72rem;
      word-break: break-all;
    }
    .seed-display span { color: #6e7681; }
  </style>
</head>
<body>
  <h1>🎲 BUDDY ROLLER</h1>
  <p class="subtitle">Roll your Claude Code companion</p>
  <div class="controls">
    <input type="text" id="seedInput" placeholder="Enter seed for deterministic roll…">
    <button id="rollBtn">🎲 Roll</button>
  </div>
  <div id="output"></div>

  <script>
  // ── Constants (from types.ts) ─────────────────────────────────────────
  const RARITIES = ['common', 'uncommon', 'rare', 'epic', 'legendary'];
  const RARITY_WEIGHTS = { common: 60, uncommon: 25, rare: 10, epic: 4, legendary: 1 };
  const RARITY_STARS   = { common: '★', uncommon: '★★', rare: '★★★', epic: '★★★★', legendary: '★★★★★' };

  const c = String.fromCharCode;
  const duck     = c(0x64,0x75,0x63,0x6b);
  const goose    = c(0x67,0x6f,0x6f,0x73,0x65);
  const blob     = c(0x62,0x6c,0x6f,0x62);
  const cat      = c(0x63,0x61,0x74);
  const dragon   = c(0x64,0x72,0x61,0x67,0x6f,0x6e);
  const octopus  = c(0x6f,0x63,0x74,0x6f,0x70,0x75,0x73);
  const owl      = c(0x6f,0x77,0x6c);
  const penguin  = c(0x70,0x65,0x6e,0x67,0x75,0x69,0x6e);
  const turtle   = c(0x74,0x75,0x72,0x74,0x6c,0x65);
  const snail    = c(0x73,0x6e,0x61,0x69,0x6c);
  const ghost    = c(0x67,0x68,0x6f,0x73,0x74);
  const axolotl  = c(0x61,0x78,0x6f,0x6c,0x6f,0x74,0x6c);
  const capybara = c(0x63,0x61,0x70,0x79,0x62,0x61,0x72,0x61);
  const cactus   = c(0x63,0x61,0x63,0x74,0x75,0x73);
  const robot    = c(0x72,0x6f,0x62,0x6f,0x74);
  const rabbit   = c(0x72,0x61,0x62,0x62,0x69,0x74);
  const mushroom = c(0x6d,0x75,0x73,0x68,0x72,0x6f,0x6f,0x6d);
  const chonk    = c(0x63,0x68,0x6f,0x6e,0x6b);

  const SPECIES = [duck,goose,blob,cat,dragon,octopus,owl,penguin,turtle,snail,
                   ghost,axolotl,capybara,cactus,robot,rabbit,mushroom,chonk];
  const EYES     = ['·','✦','×','◉','@','°'];
  const HATS     = ['none','crown','tophat','propeller','halo','wizard','beanie','tinyduck'];
  const STAT_NAMES = ['DEBUGGING','PATIENCE','CHAOS','WISDOM','SNARK'];

  const SPECIES_CN = {
    duck:'鸭子', goose:'鹅', blob:'史莱姆', cat:'猫', dragon:'龙',
    octopus:'章鱼', owl:'猫头鹰', penguin:'企鹅', turtle:'乌龟', snail:'蜗牛',
    ghost:'幽灵', axolotl:'六角恐龙', capybara:'水豚', cactus:'仙人掌',
    robot:'机器人', rabbit:'兔子', mushroom:'蘑菇', chonk:'胖猫',
  };

  const STAT_ICONS   = { DEBUGGING:'🔧', PATIENCE:'🧘', CHAOS:'🌀', WISDOM:'📚', SNARK:'💬' };
  const STAT_COLORS  = { DEBUGGING:'#58a6ff', PATIENCE:'#56d364', CHAOS:'#f85149', WISDOM:'#bc8cff', SNARK:'#e3b341' };
  const RARITY_COLOR = { common:'#9e9e9e', uncommon:'#56d364', rare:'#58a6ff', epic:'#bc8cff', legendary:'#e3b341' };

  // ── PRNG & roll logic (from roll.ts) ─────────────────────────────────
  function mulberry32(seed) {
    let a = seed >>> 0;
    return function () {
      a |= 0;
      a = (a + 0x6d2b79f5) | 0;
      let t = Math.imul(a ^ (a >>> 15), 1 | a);
      t = (t + Math.imul(t ^ (t >>> 7), 61 | t)) ^ t;
      return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
    };
  }

  function hashString(s) {
    let h = 2166136261;
    for (let i = 0; i < s.length; i++) {
      h ^= s.charCodeAt(i);
      h = Math.imul(h, 16777619);
    }
    return h >>> 0;
  }

  function pick(rng, arr) { return arr[Math.floor(rng() * arr.length)]; }

  function rollRarity(rng) {
    const total = Object.values(RARITY_WEIGHTS).reduce((a, b) => a + b, 0);
    let roll = rng() * total;
    for (const rarity of RARITIES) {
      roll -= RARITY_WEIGHTS[rarity];
      if (roll < 0) return rarity;
    }
    return 'common';
  }

  const RARITY_FLOOR = { common: 5, uncommon: 15, rare: 25, epic: 35, legendary: 50 };

  function rollStats(rng, rarity) {
    const floor = RARITY_FLOOR[rarity];
    const peak  = pick(rng, STAT_NAMES);
    let dump = pick(rng, STAT_NAMES);
    while (dump === peak) dump = pick(rng, STAT_NAMES);
    const stats = {};
    for (const name of STAT_NAMES) {
      if      (name === peak) stats[name] = Math.min(100, floor + 50 + Math.floor(rng() * 30));
      else if (name === dump) stats[name] = Math.max(1,   floor - 10 + Math.floor(rng() * 15));
      else                    stats[name] = floor + Math.floor(rng() * 40);
    }
    return stats;
  }

  const SALT = 'friend-2026-401';

  function rollFrom(rng) {
    const rarity = rollRarity(rng);
    const bones  = {
      rarity,
      species: pick(rng, SPECIES),
      eye:     pick(rng, EYES),
      hat:     rarity === 'common' ? 'none' : pick(rng, HATS),
      shiny:   rng() < 0.01,
      stats:   rollStats(rng, rarity),
    };
    return { bones, inspirationSeed: Math.floor(rng() * 1e9) };
  }

  function rollWithSeed(seed)  { return rollFrom(mulberry32(hashString(seed + SALT))); }
  function randomUUID() {
    if (typeof crypto !== 'undefined' && typeof crypto.randomUUID === 'function') {
      return crypto.randomUUID();
    }
    return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, (c) => {
      const r = (Math.random() * 16) | 0;
      return (c === 'x' ? r : (r & 0x3) | 0x8).toString(16);
    });
  }
  function rollRandom()        { const seed = randomUUID(); return { roll: rollWithSeed(seed), seed }; }

  // ── Sprite renderer (from sprites.ts) ────────────────────────────────
  const BODIES = {
    [duck]:     [['            ','    __      ','  <({E} )___  ','   (  ._>   ','    `--´    '],
                 ['            ','    __      ','  <({E} )___  ','   (  ._>   ','    `--´~   '],
                 ['            ','    __      ','  <({E} )___  ','   (  .__>  ','    `--´    ']],
    [goose]:    [['            ','     ({E}>    ','     ||     ','   _(__)_   ','    ^^^^    '],
                 ['            ','    ({E}>     ','     ||     ','   _(__)_   ','    ^^^^    '],
                 ['            ','     ({E}>>   ','     ||     ','   _(__)_   ','    ^^^^    ']],
    [blob]:     [['            ','   .----.   ','  ( {E}  {E} )  ','  (      )  ','   `----´   '],
                 ['            ','  .------.  ',' (  {E}  {E}  ) ',' (        ) ','  `------´  '],
                 ['            ','    .--.    ','   ({E}  {E})   ','   (    )   ','    `--´    ']],
    [cat]:      [['            ','   /\\_/\\    ','  ( {E}   {E})  ','  (  ω  )   ','  (")_(")   '],
                 ['            ','   /\\_/\\    ','  ( {E}   {E})  ','  (  ω  )   ','  (")_(")~  '],
                 ['            ','   /\\-/\\    ','  ( {E}   {E})  ','  (  ω  )   ','  (")_(")   ']],
    [dragon]:   [['            ','  /^\\  /^\\  ',' <  {E}  {E}  > ',' (   ~~   ) ','  `-vvvv-´  '],
                 ['            ','  /^\\  /^\\  ',' <  {E}  {E}  > ',' (        ) ','  `-vvvv-´  '],
                 ['   ~    ~   ','  /^\\  /^\\  ',' <  {E}  {E}  > ',' (   ~~   ) ','  `-vvvv-´  ']],
    [octopus]:  [['            ','   .----.   ','  ( {E}  {E} )  ','  (______)  ','  /\\/\\/\\/\\  '],
                 ['            ','   .----.   ','  ( {E}  {E} )  ','  (______)  ','  \\/\\/\\/\\/  '],
                 ['     o      ','   .----.   ','  ( {E}  {E} )  ','  (______)  ','  /\\/\\/\\/\\  ']],
    [owl]:      [['            ','   /\\  /\\   ','  (({E})({E}))  ','  (  ><  )  ','   `----´   '],
                 ['            ','   /\\  /\\   ','  (({E})({E}))  ','  (  ><  )  ','   .----.   '],
                 ['            ','   /\\  /\\   ','  (({E})(-)  )  ','  (  ><  )  ','   `----´   ']],
    [penguin]:  [['            ','  .---.     ','  ({E}>{E})     ',' /(   )\\    ','  `---´     '],
                 ['            ','  .---.     ','  ({E}>{E})     ',' |(   )|    ','  `---´     '],
                 ['  .---.     ','  ({E}>{E})     ',' /(   )\\    ','  `---´     ','   ~ ~      ']],
    [turtle]:   [['            ','   _,--._   ','  ( {E}  {E} )  ',' /[______]\\ ','  ``    ``  '],
                 ['            ','   _,--._   ','  ( {E}  {E} )  ',' /[______]\\ ','   ``  ``   '],
                 ['            ','   _,--._   ','  ( {E}  {E} )  ',' /[======]\\ ','  ``    ``  ']],
    [snail]:    [['            ',' {E}    .--.  ','  \\  ( @ )  ','   \\_`--´   ','  ~~~~~~~   '],
                 ['            ','  {E}   .--.  ','  |  ( @ )  ','   \\_`--´   ','  ~~~~~~~   '],
                 ['            ',' {E}    .--.  ','  \\  ( @  ) ','   \\_`--´   ','   ~~~~~~   ']],
    [ghost]:    [['            ','   .----.   ','  / {E}  {E} \\  ','  |      |  ','  ~`~``~`~  '],
                 ['            ','   .----.   ','  / {E}  {E} \\  ','  |      |  ','  `~`~~`~`  '],
                 ['    ~  ~    ','   .----.   ','  / {E}  {E} \\  ','  |      |  ','  ~~`~~`~~  ']],
    [axolotl]:  [['            ','}~(______)~{','}~({E} .. {E})~{','  ( .--. )  ','  (_/  \\_)  '],
                 ['            ','~}(______){~','~}({E} .. {E}){~','  ( .--. )  ','  (_/  \\_)  '],
                 ['            ','}~(______)~{','}~({E} .. {E})~{','  (  --  )  ','  ~_/  \\_~  ']],
    [capybara]: [['            ','  n______n  ',' ( {E}    {E} ) ',' (   oo   ) ','  `------´  '],
                 ['            ','  n______n  ',' ( {E}    {E} ) ',' (   Oo   ) ','  `------´  '],
                 ['    ~  ~    ','  u______n  ',' ( {E}    {E} ) ',' (   oo   ) ','  `------´  ']],
    [cactus]:   [['            ',' n  ____  n ',' | |{E}  {E}| | ',' |_|    |_| ','   |    |   '],
                 ['            ','    ____    ',' n |{E}  {E}| n ',' |_|    |_| ','   |    |   '],
                 [' n        n ',' |  ____  | ',' | |{E}  {E}| | ',' |_|    |_| ','   |    |   ']],
    [robot]:    [['            ','   .[||].   ','  [ {E}  {E} ]  ','  [ ==== ]  ','  `------´  '],
                 ['            ','   .[||].   ','  [ {E}  {E} ]  ','  [ -==- ]  ','  `------´  '],
                 ['     *      ','   .[||].   ','  [ {E}  {E} ]  ','  [ ==== ]  ','  `------´  ']],
    [rabbit]:   [['            ','   (\\__/)   ','  ( {E}  {E} )  ',' =(  ..  )= ','  (")__(")  '],
                 ['            ','   (|__/)   ','  ( {E}  {E} )  ',' =(  ..  )= ','  (")__(")  '],
                 ['            ','   (\\__/)   ','  ( {E}  {E} )  ',' =( .  . )= ','  (")__(")  ']],
    [mushroom]: [['            ',' .-o-OO-o-. ','(__________)',   '   |{E}  {E}|   ','   |____|   '],
                 ['            ',' .-O-oo-O-. ','(__________)',   '   |{E}  {E}|   ','   |____|   '],
                 ['   . o  .   ',' .-o-OO-o-. ','(__________)',   '   |{E}  {E}|   ','   |____|   ']],
    [chonk]:    [['            ','  /\\    /\\  ',' ( {E}    {E} ) ',' (   ..   ) ','  `------´  '],
                 ['            ','  /\\    /|  ',' ( {E}    {E} ) ',' (   ..   ) ','  `------´  '],
                 ['            ','  /\\    /\\  ',' ( {E}    {E} ) ',' (   ..   ) ','  `------´~ ']],
  };

  const HAT_LINES = {
    none: '', crown: '   \\^^^/    ', tophat: '   [___]    ',
    propeller: '    -+-     ', halo: '   (   )    ',
    wizard: '    /^\\     ', beanie: '   (___)    ', tinyduck: '    ,>      ',
  };

  function renderSprite(bones, frame = 0) {
    const frames = BODIES[bones.species];
    const body = frames[frame % frames.length].map(line => line.replaceAll('{E}', bones.eye));
    const lines = [...body];
    if (bones.hat !== 'none' && !lines[0].trim()) lines[0] = HAT_LINES[bones.hat];
    if (!lines[0].trim() && frames.every(f => !f[0].trim())) lines.shift();
    return lines;
  }

  function renderFace(bones) {
    const e = bones.eye;
    switch (bones.species) {
      case duck: case goose: return `(${e}>`;
      case blob:    return `(${e}${e})`;
      case cat:     return `=${e}ω${e}=`;
      case dragon:  return `<${e}~${e}>`;
      case octopus: return `~(${e}${e})~`;
      case owl:     return `(${e})(${e})`;
      case penguin: return `(${e}>)`;
      case turtle:  return `[${e}_${e}]`;
      case snail:   return `${e}(@)`;
      case ghost:   return `/${e}${e}\\`;
      case axolotl: return `}${e}.${e}{`;
      case capybara:return `(${e}oo${e})`;
      case cactus:  return `|${e}  ${e}|`;
      case robot:   return `[${e}${e}]`;
      case rabbit:  return `(${e}..${e})`;
      case mushroom:return `|${e}  ${e}|`;
      case chonk:   return `(${e}.${e})`;
    }
  }

  // ── UI ────────────────────────────────────────────────────────────────
  const ESC_MAP = {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'};
  function escapeHtml(str) {
    return String(str).replace(/[&<>"']/g, c => ESC_MAP[c]);
  }

  let animTimer = null;
  let currentFrames = [];
  let frameIdx = 0;

  function startAnimation(color) {
    if (animTimer) clearInterval(animTimer);
    if (currentFrames.length <= 1) return;
    animTimer = setInterval(() => {
      frameIdx = (frameIdx + 1) % currentFrames.length;
      const el = document.getElementById('sprite');
      if (el) { el.textContent = currentFrames[frameIdx].join('\n'); el.style.color = color; }
    }, 650);
  }

  function renderBuddy(bones, seed) {
    currentFrames = [0, 1, 2].map(f => renderSprite(bones, f));
    frameIdx = 0;
    const color  = RARITY_COLOR[bones.rarity] || '#c9d1d9';
    const shiny  = bones.shiny ? '<span class="shiny-badge">✨ SHINY</span>' : '';
    const cn     = SPECIES_CN[bones.species] ? `<span class="species-cn">(${SPECIES_CN[bones.species]})</span>` : '';
    const face   = escapeHtml(renderFace(bones));

    const statsHtml = STAT_NAMES.map(name => {
      const val = bones.stats[name];
      const clr = STAT_COLORS[name] || '#888';
      return `<div class="stat-row">
        <span class="stat-name">${STAT_ICONS[name]} ${name}</span>
        <div class="stat-bar-bg"><div class="stat-bar-fill" style="width:${val}%;background:${clr}"></div></div>
        <span class="stat-value">${val}</span>
      </div>`;
    }).join('');

    document.getElementById('output').innerHTML = `
      <div class="card">
        <div>
          <span class="rarity-badge rarity-${bones.rarity}">${bones.rarity.toUpperCase()} ${RARITY_STARS[bones.rarity]}</span>
          ${shiny}
        </div>
        <div class="species-row">
          <span class="species-name">${bones.species}</span>
          ${cn}
        </div>
        <div class="meta">Eye: ${bones.eye} &nbsp;·&nbsp; Hat: ${bones.hat} &nbsp;·&nbsp; Face: ${face}</div>
        <div class="sprite-wrap">
          <pre class="sprite" id="sprite" style="color:${color}">${escapeHtml(currentFrames[0].join('\n'))}</pre>
        </div>
        <hr class="divider">
        <div class="stats-title">Stats</div>
        ${statsHtml}
        <div class="seed-display">Seed: <span>${escapeHtml(seed)}</span></div>
      </div>
    `;

    startAnimation(color);
  }

  function roll() {
    const seedInput = document.getElementById('seedInput').value.trim();
    const btn = document.getElementById('rollBtn');
    btn.disabled = true;

    let seed, result;
    if (seedInput) {
      seed   = seedInput;
      result = rollWithSeed(seed);
    } else {
      const r = rollRandom();
      seed   = r.seed;
      result = r.roll;
    }

    renderBuddy(result.bones, seed);
    btn.disabled = false;
  }

  document.getElementById('rollBtn').addEventListener('click', roll);
  roll();
  </script>
</body>
</html>
